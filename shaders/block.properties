# Exact block IDs for shader material classification.
# Read in gbuffers/shadow shaders through mc_Entity.x.
block.10000 = minecraft:water minecraft:bubble_column

# Emissive colored-light surfaces. These do not change Minecraft's voxel
# light engine, but they make placed light blocks/torches glow with color and
# feed colored bloom into the post pass.
block.10010 = minecraft:torch minecraft:wall_torch minecraft:lantern minecraft:glowstone minecraft:shroomlight minecraft:jack_o_lantern minecraft:campfire minecraft:end_rod minecraft:lava minecraft:lava_cauldron
block.10011 = minecraft:redstone_torch minecraft:redstone_wall_torch minecraft:redstone_lamp
block.10012 = minecraft:soul_torch minecraft:soul_wall_torch minecraft:soul_lantern minecraft:soul_campfire
block.10013 = minecraft:sea_lantern minecraft:prismarine minecraft:dark_prismarine minecraft:glow_lichen


# Fancy/translucent leaves render through gbuffers_water in Iris, which lets
# water blend over solid leaf texels. Force foliage back to cutout terrain so it
# writes opaque depth before the water pass.
# Iris currently rejects tags in the render type map, so keep this explicit.
block.10001 = minecraft:oak_leaves minecraft:spruce_leaves minecraft:birch_leaves minecraft:jungle_leaves minecraft:acacia_leaves minecraft:dark_oak_leaves minecraft:mangrove_leaves minecraft:cherry_leaves minecraft:azalea_leaves minecraft:flowering_azalea_leaves
layer.cutout = minecraft:oak_leaves minecraft:spruce_leaves minecraft:birch_leaves minecraft:jungle_leaves minecraft:acacia_leaves minecraft:dark_oak_leaves minecraft:mangrove_leaves minecraft:cherry_leaves minecraft:azalea_leaves minecraft:flowering_azalea_leaves
